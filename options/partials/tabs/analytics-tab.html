                    d="M12,18.54L19.37,12.8L21,14.07L12,21.07L3,14.07L4.62,12.81L12,18.54M12,16L3,9L12,2L21,9L12,16M12,4.53L6.26,9L12,13.47L17.74,9L12,4.53Z"

<div class="content-card large-card">
    <div class="card-header">
        <h2>Usage Trends</h2>
        <div class="chart-controls">
            <div
                class="chart-options"
                style="display: flex; align-items: center; gap: 12px; margin-right: 16px"
            >
                <label
                    class="modern-checkbox"
                    style="
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        font-size: 0.85rem;
                        cursor: pointer;
                        color: var(--text-secondary);
                    "
                >
                    <input
                        type="checkbox"
                        id="rollingAverageToggle"
                        style="width: 14px; height: 14px"
                    />
                    Rolling Average
                </label>
            </div>
            <div class="chart-period-selector" role="group" aria-label="Chart Range">
                <button class="period-btn active" data-period="week">Week</button>
                <button class="period-btn" data-period="month">Month</button>
                <button class="period-btn" data-period="year">Year</button>
            </div>
            <div class="chart-navigation">
                <button class="nav-btn" id="chartPrev" title="Previous">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z" />
                    </svg>
                </button>
                <span class="chart-period-label" id="chartPeriodLabel">This Week</span>
                <button class="nav-btn" id="chartNext" title="Next">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z" />
                    </svg>
                </button>
                <button
                    class="nav-btn"
                    id="chartToday"
                    title="Return to today"
                    style="border-radius: 50%; padding: 4px; margin-left: 8px"
                >
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="10" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="chart-container" id="usageChart">
            <div class="chart-area">
                <div class="chart-y-axis" id="chartYAxis"></div>
                <div class="chart-content" id="chartContent"></div>
            </div>
            <div class="chart-x-axis" id="chartXAxis"></div>
            <div class="chart-earliest-indicator" id="chartEarliestIndicator" style="display: none">
                <div class="earliest-line"></div>
                <span class="earliest-label">Tracking started</span>
            </div>
        </div>
    </div>
</div>

<div class="content-card">
    <div class="card-header">
        <div style="display: flex; align-items: center; gap: var(--spacing-sm)">
            <h2 style="line-height: 1">Activity Heatmap</h2>
            <span class="heatmap-sites-count" id="heatmapSitesCount">0 Sites Tracked</span>
        </div>
        <div class="heatmap-year-nav" id="heatmapYearNav">
            <button class="heatmap-year-btn" id="heatmapYearPrev" title="Previous year">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z" />
                </svg>
            </button>
            <span class="heatmap-year-label" id="heatmapYearLabel">2026</span>
            <button class="heatmap-year-btn" id="heatmapYearNext" title="Next year">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z" />
                </svg>
            </button>
        </div>
        <div class="heatmap-controls">
            <select id="heatmapFilter" class="modern-select">
                <option value="all">All Sites</option>
                <option value="restricted">Restricted Sites Only</option>
            </select>
        </div>
    </div>
    <div class="card-body">
        <div class="heatmap-container" id="heatmapContainer">
            <div class="heatmap-months" id="heatmapMonths"></div>
            <div class="heatmap-grid-wrapper">
                <div class="heatmap-days">
                    <span>Sun</span>
                    <span>Mon</span>
                    <span>Tue</span>
                    <span>Wed</span>
                    <span>Thu</span>
                    <span>Fri</span>
                    <span>Sat</span>
                </div>
                <div class="heatmap-grid" id="heatmapGrid"></div>
            </div>
        </div>
    </div>
</div>

<div class="content-card">
    <div
        class="card-header"
        style="display: flex; justify-content: space-between; align-items: center"
    >
        <h2 id="topSitesHeading">Top Sites Today</h2>
        <div class="setting-group" style="margin: 0; display: flex; align-items: center; gap: 8px">
            <label
                for="trackingFrequency"
                style="
                    font-size: 0.85rem;
                    color: var(--text-secondary);
                    margin: 0;
                    display: flex;
                    align-items: center;
                    gap: 4px;
                "
            >
                Tracking Interval (s)
                <span
                    class="info-tooltip"
                    title="How often the extension updates your time logs. Lower values are more accurate but use more resources."
                    >?</span
                >
            </label>
            <input
                type="number"
                id="trackingFrequency"
                min="0.1"
                max="60"
                step="0.01"
                placeholder="1.00"
                class="modern-input short"
                style="padding: 4px 8px; width: 64px; min-height: unset; height: auto"
            />
        </div>
    </div>
    <div class="card-body">
        <div class="analytics-sites-list" id="analyticsTopSites">
            <div class="analytics-empty-state">No activity recorded today.</div>
        </div>
    </div>
</div>
