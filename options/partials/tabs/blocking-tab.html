<div class="two-column-grid">
    <div class="content-card">
        <div class="card-header">
            <h2>Hard-Blocked Sites</h2>
        </div>
        <div class="card-body">
            <p class="section-description">These sites are completely inaccessible.</p>
            <div class="rule-manager" id="blockedManager">
                <div class="rule-input-group modern-input-group">
                    <label for="blockedDomainInput" class="sr-only">Domain to block</label>
                    <input
                        type="text"
                        id="blockedDomainInput"
                        placeholder="e.g., facebook.com…"
                        class="modern-input"
                        autocomplete="off"
                        name="blocked-domain"
                        spellcheck="false"
                    />
                    <button id="addBlockedBtn" class="btn btn-primary">Add</button>
                </div>
                <ul class="rule-list modern-list" id="blockedList"></ul>
            </div>
        </div>
    </div>

    <div class="content-card">
        <div class="card-header">
            <h2>Restricted Access</h2>
        </div>
        <div class="card-body">
            <p class="section-description">
                Sites allowed for <i>specific</i> amounts of time per day.
            </p>
            <div class="rule-manager" id="restrictedManager">
                <div class="restricted-form-container">
                    <div class="restricted-form-row">
                        <div
                            class="restricted-form-group"
                            style="height: 100%; display: flex; flex-direction: column"
                        >
                            <label for="restrictedDomainInput" class="restricted-form-label"
                                >Website Domain</label
                            >
                            <input
                                type="text"
                                id="restrictedDomainInput"
                                placeholder="e.g., youtube.com…"
                                class="modern-input restricted-form-input"
                                autocomplete="off"
                                name="restricted-domain"
                                spellcheck="false"
                            />
                            <div class="restricted-form-actions" style="margin-top: 8px">
                                <button
                                    id="addRestrictedBtn"
                                    class="btn btn-primary"
                                    style="width: 100%; max-width: 300px"
                                >
                                    Add Restriction
                                </button>
                            </div>
                        </div>

                        <div class="restricted-form-group">
                            <label class="restricted-form-label">Time Allowed Per Day</label>
                            <div class="circ-picker-wrap">
                                <div
                                    id="restrictedPickerMount"
                                    aria-label="Time limit picker"
                                ></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div
                    class="restricted-list-header"
                    style="
                        margin-top: 2rem;
                        margin-bottom: 1rem;
                        border-bottom: 1px solid var(--border);
                        padding-bottom: 0.5rem;
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                    "
                >
                    <h3 style="font-size: 1rem; margin: 0; color: var(--text-primary)">
                        Restricted Websites
                    </h3>
                    <button id="newGroupBtn" class="btn-new-group">+ New Group</button>
                </div>
                <ul class="rule-list modern-list" id="restrictedList"></ul>
            </div>
        </div>
    </div>
</div>
